# Banco via variáveis de ambiente
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Produçăo ? nunca update
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Logs mínimos em produçăo
logging.level.com.br.stockpro=WARN
logging.level.org.flywaydb=INFO