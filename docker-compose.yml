version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: stockpro-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-stockpro}
      MYSQL_USER: ${DB_USER:-stockpro}
      MYSQL_PASSWORD: ${DB_PASSWORD:-stockpro123}
    ports:
      - "3307:3306"
    volumes:
      - stockpro_db_data:/var/lib/mysql
    networks:
      - stockpro-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
      interval: 10s

  app:
    build: .
    container_name: stockpro-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-stockpro}
      DB_USER: ${DB_USER:-stockpro}
      DB_PASSWORD: ${DB_PASSWORD:-stockpro123}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    ports:
      - "8080:8080"
    networks:
      - stockpro-network

volumes:
  stockpro_db_data:

networks:
  stockpro-network:
    driver: bridge